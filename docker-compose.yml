services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tags
      POSTGRES_PASSWORD: tags
      POSTGRES_DB: tags
    ports:
      - "5433:5432"
    volumes:
      - tags_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tags -d tags"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  tags_pg:
